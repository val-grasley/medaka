name: CI

# Runs on the self-hosted runner (`medaka-box`) — the 12-core EPYC box that
# AGENTS.md already calls CI-of-record.
#
# Why self-hosted and not a GitHub-hosted runner: this repo is PRIVATE, so hosted
# minutes are capped (2,000/mo on the free plan) AND hosted runners are 2-core.
# This suite's speed comes entirely from parallelism (oracle build 327s -> 34s, gate
# suite 125s -> 32s, both on 12 cores), so a 2-core runner would forfeit nearly all
# of it and push a full run to ~10 min — about 200 runs/month before it costs money.
# Self-hosted is free regardless of visibility and keeps the parallelism.
#
# The usual objection to self-hosted runners — a fork PR can execute arbitrary code
# on your machine — does not apply to a private repo with no outside contributors.

on:
  push:
    branches: [main, testing-arc]
  pull_request:
  workflow_dispatch:

# A CI run is a heavy build on the same box people develop on. Superseded runs are
# pure contention, so cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: [self-hosted, medaka-box]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      # A self-hosted runner reuses its workspace between runs. Untracked junk from
      # a previous run would otherwise leak into the review gate below and make it
      # lie. Start from a genuinely clean tree.
      - name: Clean the workspace
        run: git clean -xfd && git reset --hard

      # COLD path: a fresh checkout has no ./medaka_emitter, so this bootstraps it
      # from the checked-in seed (compiler/seed/emitter.ll.gz). That means every CI
      # run also proves the cold bootstrap still works — the trust anchor. If the
      # seed goes stale, THIS is what catches it.
      - name: Build medaka (cold bootstrap from seed)
        run: make medaka

      # FORCE is mandatory, not belt-and-braces: build_oracles.sh mtime-skips, and a
      # stale test/bin/* oracle makes every gate below pass against an old compiler.
      - name: Build stage oracles
        run: FORCE=1 sh test/build_oracles.sh

      # run_gates.sh hard-fails if zero gates passed, and reclassifies a
      # missing-oracle exit-2 as a FAILURE rather than a SKIP — so a CI run that
      # silently tested nothing can no longer report green.
      - name: Gate suite
        run: sh test/run_gates.sh

      - name: In-language suite (doctests, props, test decls)
        run: make test

      # THE REVIEW GATE.
      #
      # Roc's model: regeneration is the default action and `git diff --exit-code`
      # forces every regenerated byte into PR review. That guard is what makes a
      # frictionless `--bless` safe; GHC and OCaml, lacking it, deliberately build
      # friction into blessing instead (GHC's accept only fires on already-failing
      # tests; OCaml's `make promote` refuses to run suite-wide). Medaka currently
      # has NEITHER guard, which is the dangerous quadrant.
      #
      # TODAY this catches gates that pollute the working tree (bootstrap_lex.sh
      # writes scratch into the repo root) and any golden a gate rewrites in place.
      # AFTER the snapshot migration lands `medaka test --bless`, this step becomes
      # the real guard: regenerate everything, then fail if anything moved without
      # a human looking at it. Do not remove it in the meantime — it must be load-
      # bearing BEFORE blessing gets easy, not after.
      - name: Review gate — the tree must not have drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::The suite modified tracked files. Goldens/artifacts drifted —"
            echo "::error::commit them deliberately, or fix the gate that writes into the tree."
            exit 1
          fi
          if [ -n "$(git status --porcelain --untracked-files=normal | grep -v '^!!')" ]; then
            echo "::error::The suite left untracked files behind:"
            git status --porcelain --untracked-files=normal
            exit 1
          fi
