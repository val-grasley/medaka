name: CI

# GitHub-HOSTED runners. Free and unlimited for public repositories, 20 concurrent
# jobs on the Free plan.
#
# ── Why there is no shared "build" job ──────────────────────────────────────────
# The obvious shape — build once, upload an artifact, fan out — was tried and is
# WRONG here. Measured on a hosted runner:
#
#     Install toolchain .................  13s
#     make medaka (cold, from seed) .....  80s     <- fine
#     FORCE=1 build_oracles.sh .......... 18+ min  <- 93% of the job, and climbing
#
# `build_oracles.sh` compiles 54 probe binaries (54 × `medaka build` + clang). On
# the 12-core dev box that is ~34s; on a small hosted runner it dominates
# everything and blows the timeout. Caching it would only help when the compiler is
# untouched — which is exactly never, for compiler work.
#
# The fix: NO GATE NEEDS ALL 54. A gate names its oracle as `test/bin/<name>`, so
# `build_oracles.sh --for '<gate-pattern>'` derives the set straight from the gate
# scripts. Per shard: engines 2, frontend 14, types 10, eval 19, backend 6, tools 6.
# So each shard builds its own handful CONCURRENTLY with the others — the critical
# path drops from 54-serial to 19-parallel, and the artifact plumbing disappears.
#
# `test/preflight.sh` uses the SAME derivation, so an agent touching the parser
# builds 9 oracles locally instead of 54. One source of truth, two consumers.
#
# ── Why the drift check is inside each shard ────────────────────────────────────
# It cannot be a separate job: a fresh checkout in a fresh VM would never see drift
# caused by gates that ran somewhere else. It has to run in the same working tree,
# right after the gates.
#
# NOTE: this repo previously used a self-hosted runner on the dev box. It was
# removed before going public — a fork PR on a PUBLIC repo with a self-hosted runner
# is arbitrary code execution on the runner host. Do not reintroduce one.
#
# ── Caching (added 2026-07-13) — read this before touching a `key:` below ──────
#
# `./medaka` + `./medaka_emitter` (the "Build medaka" step) and each shard's
# `test/bin/*` oracles are cached across runs, keyed on a hash of everything those
# artifacts are built FROM. This is the exact bug class the testing arc was
# hardened against, one level up — build_oracles.sh's OWN staleness check once
# scanned only `compiler/**.mdk` and missed `stdlib/`/`runtime/`, so every oracle
# went silently stale (see AGENTS.md). Any cache key here must be held to the same
# standard: provably cover everything the cached artifact depends on, or don't
# cache it.
#
# The key hashes: `compiler/**` (source + entries + the seed — see below),
# `stdlib/**` (every oracle and ./medaka link the whole stdlib), `runtime/**` (the
# C runtime linked into every binary), and the build SCRIPTS themselves
# (test/build_native_medaka.sh, test/bootstrap_from_seed.sh, test/build_oracles.sh,
# Makefile) — a fix to HOW we build must bust the cache exactly as much as a
# change to WHAT we build. `compiler/**` also sweeps in
# compiler/seed/emitter.ll.gz, which the built binary does NOT actually depend on
# (self-hosting is a fixpoint: ./medaka's bytes are a pure function of current
# source, cold- or warm-bootstrapped) — so a seed re-mint busts the cache one
# build more than strictly necessary. That's the safe direction to be wrong in:
# the alternative (hand-picking `*.mdk`/`*.c`/`*.h` extensions) is the same
# one-line mistake that caused the original bug, so the wider, provably-complete
# glob wins even at the cost of a little hit-rate.
#
# Every key below is an EXACT match — no `restore-keys` fallback anywhere. A
# partial/nearest-match restore is precisely the "close enough" staleness this
# suite keeps getting bitten by. A MISS always falls straight through to the
# untouched cold-build step; it is NEVER treated as a pass.
#
# The COLD bootstrap-from-seed path is never fully removed from the workflow:
# `seed-health` (below) is NOT cached and runs it on every single push — that is
# the trust anchor, and this caching must never be the only thing proving the seed
# still works. The `gates`/`inlang` jobs may skip their OWN cold bootstrap on a
# cache hit, but the anchor job always re-proves it independently.

on:
  push:
    branches: [main, testing-arc]
  pull_request:
  # REQUIRED BY THE MERGE QUEUE. A queued PR is tested on a `merge_group` event — a
  # temporary branch holding YOUR pr merged on top of everything already queued ahead
  # of it. Without this trigger the required checks never run on that branch, the entry
  # waits forever, and the queue DEADLOCKS. Do not remove it while a merge queue exists.
  #
  # This is the whole point of the queue for THIS repo: PR CI tests your BRANCH, the queue
  # tests the MERGED RESULT. Two green branches merging into a broken tree is not
  # hypothetical here — it happened twice on 2026-07-13. Git flagged 2 conflicts between the
  # TMC arc and the arg-tuple removal and cleanly auto-merged a THIRD break it could not see
  # (a new caller of a signature the other branch had rewritten — different lines, so no
  # conflict); the merged tree crashed. Separately, two branches that both touched
  # typecheck.mdk auto-merged fine and their GOLDENS silently diverged, taking main red.
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Oracles are throwaway binaries; -O0 builds them much faster and their runtime is
  # hidden by parallelism. The emitter is the reused workhorse and stays -O2.
  ORACLE_OPT: -O0

jobs:
  # ── T-4b: docs-only fast path ───────────────────────────────────────────────
  #
  # A change that touches ONLY prose (top-level *.md, docs/**, LICENSE) still runs
  # the full 40+ min gate suite today. This job classifies the PR's changed files
  # and every heavy job below (gates/soundness/seed-health/inlang) reads its output
  # to skip their EXPENSIVE STEPS, not to skip THEMSELVES.
  #
  # ⚠️ Do NOT convert this into `if:` at the JOB level on gates/soundness/etc, and
  # do NOT path-filter the `on:` trigger above. Branch protection requires 9 named
  # status checks (the 6 `gates (…)` shards, `soundness`, `seed-health`, `inlang`)
  # with ZERO approvals — the checks ARE the merge gate. A job skipped by a
  # job-level `if:`, or a workflow that never runs because of a `paths-ignore:`
  # trigger filter, means GitHub never receives a status for that context. It sits
  # at "Expected — waiting for status" FOREVER and the PR becomes permanently
  # unmergeable — not fast, blocked. So every required job must always RUN and
  # always REPORT (success or failure); only its STEPS are conditional.
  #
  # ⚠️ THE RULE: `test/**` is NEVER docs. Every OTHER `.md` in the tree IS docs.
  #
  # test/ holds 175 `.md` files and they are FUNCTIONAL, not prose: 167 are snapshot
  # GOLDENS (test/snapshots/**/*.md), plus test/CAPABILITY-MATRIX.md,
  # test/ENGINE-DIVERGENCE.md and test/error_quality_fixtures/{INVENTORY,GRADING}.md.
  # A naive `**.md` filter would classify a blessed golden re-cut as docs-only and
  # skip every gate that exists to catch exactly that regression — a silent-green
  # bug, which is the one thing this test suite is built to prevent. So the `test/*`
  # arm comes FIRST in the case below and must stay there.
  #
  # Everything else that ends in `.md` is prose and takes the fast path: the ~50
  # top-level docs, compiler/**'s ~47 design docs, .claude/**'s playbooks, sqlite/,
  # archive/, stdlib/README.md, docs/**, LICENSE. Verified: nothing in the build, in
  # any gate, or in any workflow READS a `.md` outside test/ at runtime.
  #
  # Still scoped to the `.md` EXTENSION on purpose — .claude/ also holds
  # hooks/skill-triage.py and settings.json, compiler/ holds .mdk source, and
  # runtime/ holds C. Those are executable and fall through to the `*)` catch-all as
  # NOT docs. Do not widen this to a bare directory glob.
  #
  # Conservative in the direction that matters: any unrecognized path → the full
  # suite. A false "docs-only" is a shipped bug; a false "not docs-only" costs some
  # CI minutes, which are free on a public repo.
  #
  # Only meaningful for `pull_request` (there IS a base/head diff to classify).
  # Every other trigger (push to main/testing-arc, merge_group, workflow_dispatch)
  # defaults docs_only=false — always the full suite; those aren't PR-gating a
  # not-yet-merged change, and the safe direction to be wrong in is "ran too much".
  detect:
    name: detect docs-only change
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4

      - name: Classify changed files
        id: classify
        run: |
          set -u
          event="${{ github.event_name }}"
          if [ "$event" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "not a pull_request event ($event) — running the full suite."
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          git cat-file -e "$base" 2>/dev/null || git fetch --no-tags --depth=1 origin "$base" 2>/dev/null || true
          git cat-file -e "$head" 2>/dev/null || git fetch --no-tags --depth=1 origin "$head" 2>/dev/null || true

          if ! git cat-file -e "$base" 2>/dev/null || ! git cat-file -e "$head" 2>/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "could not resolve base/head commits locally — running the full suite (conservative default)."
            exit 0
          fi

          changed="$(git diff --name-only "$base" "$head" || true)"
          if [ -z "$changed" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "no changed files resolved — running the full suite (conservative default)."
            exit 0
          fi

          echo "changed files:"
          printf '%s\n' "$changed"

          # See the job header for why this is an ALLOWLIST, not a **.md denylist.
          changed_file="$(mktemp)"
          printf '%s\n' "$changed" > "$changed_file"
          docs_only=true
          while IFS= read -r f; do
            if [ -z "$f" ]; then
              continue
            fi
            case "$f" in
              # ── test/ IS NEVER DOCS. This arm MUST come first. ────────────────────
              # test/ holds 175 .md files and they are FUNCTIONAL, not prose: 167 are
              # snapshot GOLDENS (test/snapshots/**/*.md), plus CAPABILITY-MATRIX.md,
              # ENGINE-DIVERGENCE.md and the error_quality_fixtures/ graded corpus.
              # Classifying a blessed golden re-cut as "docs-only" would SKIP THE ENTIRE
              # SUITE on the exact change most likely to need it — manufacturing the
              # silent-green failure this suite exists to prevent. Never relax this.
              test/*) docs_only=false ;;

              # ── SYNTAX.md IS NOT PROSE — IT IS AN EXECUTABLE SPEC. ────────────────
              # AGENTS.md designates SYNTAX.md the ground truth for what the binary
              # accepts, and test/check_syntax_examples.sh RUNS every one of its
              # examples through `medaka check`. That gate needs a built compiler, so
              # it lives in a gate shard — and shards are SKIPPED when docs_only=true.
              # Classifying a SYNTAX.md edit as docs-only would therefore skip the one
              # gate that exists to check it, on the one change that needs it.
              #
              # This is not hypothetical: SYNTAX.md shipped for months documenting FIVE
              # REMOVED CONSTRUCTS as live syntax (backtick infix, let-else, named
              # impls, default impl, @Name) because nothing ever executed it. Same
              # silent-green shape as the test/ arm above; same answer.
              docs/spec/SYNTAX.md) docs_only=false ;;

              docs/*) : ;;
              LICENSE|LICENSE.*) : ;;

              # Every OTHER .md in the tree is prose: root (50), compiler/ (47 design
              # docs), .claude/ (16 agent playbooks), sqlite/, archive/, qa-beta*/ …
              # Verified: nothing in the build, in any gate, or in any workflow READS a
              # .md outside test/ at runtime.
              # Scoped to `.md` ON PURPOSE — .claude/ also holds hooks/skill-triage.py and
              # settings.json, and compiler/ holds .mdk source; those are executable and
              # fall through to the `*)` catch-all as NOT docs. Do not widen to a bare
              # directory glob.
              *.md) : ;;

              *) docs_only=false ;;
            esac
          done < "$changed_file"
          rm -f "$changed_file"

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "classified: docs_only=$docs_only"

  gates:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false          # one shard failing must not hide the others
      matrix:
        include:
          # Every gate in the repo lands in exactly ONE shard — verified by
          # test/diff_compiler_ci_shard_coverage.sh (0 missing, 0 duplicated). A gate
          # falling between shards would silently never run, which is the exact class
          # of rot this suite is being hardened against.
          #
          # Quoting is load-bearing on BOTH layers:
          #   * outer DOUBLE quotes -> one YAML scalar (a bare `'a' 'b'` is invalid
          #     YAML; it reads the first token and chokes on the rest);
          #   * inner SINGLE quotes -> survive into the shell so it does not expand
          #     the globs before run_gates.sh sees them.
          # And do NOT use brace expansion: run_gates.sh runs under POSIX sh (dash),
          # which does not expand braces, so it would glob to nothing.
          #
          # ── SHARDS ARE SCHEDULED BY COST, NOT BY THEME (2026-07-14) ──────────────
          #
          # The shard NAMES are thematic and that is fine — they make a failure legible.
          # The SCHEDULE is not: jobs run in parallel, so total CI wall-clock is the
          # SLOWEST shard, and grouping by subsystem stacked the three most expensive
          # gates in the repo onto one runner while five others idled for four minutes.
          #
          # Measured per-gate CPU seconds (2026-07-14, wasm-tools absent = what a hosted
          # runner sees; a shard's wall ≈ setup + Σcpu / 2, since run_gates' outer pool is
          # JOBS=2 on a 4-core hosted runner):
          #
          #   diff_compiler_engines  ..  834   <- 346 fixtures x (medaka build + clang)
          #   build_construct_coverage   282   <- 144 fixtures x (medaka build + clang)
          #   sqlite/test/*oracle (22)   188   <- 22 gates, 3-15s each
          #   backend (12 gates)         298
          #   tools  (27 gates)          114
          #   types  (20 gates)           36
          #   eval   (27 gates)           27
          #   frontend (15 gates)         12
          #
          # The old `engines` shard held 834+282+188 = 1304 of the suite's ~1790 CPU-s.
          # It measured 517s wall while `frontend` measured 138s — i.e. ONE shard WAS the
          # critical path and the other five were noise. So:
          #
          #   * diff_compiler_engines now OWNS a runner (it cannot go below Σcpu/ncores).
          #   * the 22 sqlite oracles get their own shard — they are 22 INDEPENDENT gates,
          #     embarrassingly parallel, and they are what CI-COVERAGE-EXCEPTIONS.txt has
          #     been claiming all along ("Now in the `sqlite` shard" — there wasn't one).
          #   * build_construct_coverage moves to `frontend`, the CHEAPEST shard (12 CPU-s
          #     of gates behind a 14-oracle build). It is a backend gate sitting in a shard
          #     named frontend, and that is deliberate: it is placed where there is idle
          #     runner, not where its name says. It was also SERIAL — 282s of wall on any
          #     machine — and is now fanned out (298s -> 111s at run_gates' JOBS=3), which
          #     is what makes it fit anywhere at all.
          #
          # GitHub gives this repo 20 concurrent jobs and we use ~11. More, smaller shards
          # are nearly free; a long pole is not. When you add a heavy gate, put it where
          # there is ROOM, and update the table above.
          - name: engines
            # ALONE ON ITS RUNNER, on purpose. 834 CPU-s — the single most expensive thing
            # in the suite by 3x, and irreducible: 346 fixtures each paying a full `medaka
            # build` + clang. On a 4-core runner that is a ~210s floor no matter what else
            # we do, so anything sharing this shard is added directly to the critical path.
            #
            # `full_cores` (below) matters as much as the pattern: the gate's own default is
            # ENGINE_JOBS=NCPU/2, which is the right hedge when it shares a runner with other
            # gates and leaves HALF THE BOX IDLE when it doesn't. It doesn't, now.
            pattern: "'diff_compiler_engines'"
            full_cores: "1"
          - name: sqlite
            # THE 22 differential gates that diff the pure-Medaka SQLite library against the
            # REAL sqlite3 CLI (T8). They had never run in CI — not because anyone excluded
            # them, but because NO PATTERN COULD REACH THEM: run_gates.sh globbed
            # `$ROOT/test/<pat>.sh` and these live in sqlite/test/. run_gates.sh,
            # build_oracles.sh --for, and the coverage gate now all resolve a pattern against
            # BOTH `$ROOT/test/` and `$ROOT/`, so a shard can name a gate anywhere in the tree.
            #
            # 22 independent gates, 188 CPU-s total, longest single gate 15s — the most
            # shardable work in the repo, and it landed in the ALREADY-longest shard. Its own
            # runner costs nothing (we use 11 of 20 concurrent jobs) and takes ~95s off the
            # critical path. CI-COVERAGE-EXCEPTIONS.txt already described this shard as
            # existing; now it does.
            #
            # They read NO test/bin oracle (they drive ./medaka directly), so this shard's
            # oracle step correctly builds nothing. They need `sqlite3`, installed below.
            #
            # NOTE the glob is '*oracle', not '*_oracle': 21 of them are <name>_oracle.sh but
            # the 22nd is plain `oracle.sh`. '*_oracle' silently left it out — and the coverage
            # gate caught that immediately, on its first run after being widened. Which is the
            # whole argument for the widened gate in one line.
            pattern: "'sqlite/test/*oracle'"
          - name: frontend
            # 'native_fixtures/run' (T8): 11 native-only regression assertions (parse-error
            # location + foreign-syntax hints + one eval dispatch check). A real gate that
            # ran NOWHERE — it sits one directory below test/, so even the coverage gate's
            # `test/*.sh` glob could not see it. It was RED. Its one real failure (compiler
            # bug T-12) is now an XFAIL in the gate's own expected-failure ledger, so it runs
            # here green and still fails loudly if the bug regresses OR gets fixed.
            #
            # 'build_construct_coverage' (T-3): a BACKEND gate (144 construct fixtures through
            # the native `medaka build`, stdout diffed against committed goldens), parked here
            # for COST, not theme — see the shard-scheduling note above. frontend's own 15
            # gates are 12 CPU-s combined, i.e. this shard was ~130s of oracle build and then
            # nothing. It has the room; `engines` and `backend` do not.
            pattern: "'diff_compiler_lex*' 'diff_compiler_parse*' 'diff_compiler_snapshot*' 'diff_compiler_resolve*' 'diff_compiler_comments' 'diff_compiler_positions' 'diff_compiler_printer' 'diff_compiler_fmt' 'native_fixtures/run' 'build_construct_coverage'"
          - name: types
            pattern: "'diff_compiler_typecheck*' 'diff_compiler_check*' 'diff_compiler_exhaust' 'diff_compiler_diagnostics' 'diff_compiler_analyze_project' 'effect_param_domain' 'effect_builtin_param_domain' 'effect_product_domain' 'effect_set_domain'"
          - name: eval
            # The 4 bootstrap_* stage gates (each native pipeline stage == the interpreter's
            # output) also ran in NO CI job until 2026-07-13 — found by the coverage gate
            # once it was taught to look past the diff_compiler_* family. All 4 green, ~2s.
            #
            # Named individually, NOT globbed as 'bootstrap_*': that glob also catches
            # bootstrap_from_seed.sh, the 80s cold bootstrap that seed-health already owns.
            pattern: "'diff_compiler_eval*' 'diff_compiler_core_ir*' 'bootstrap_lex' 'bootstrap_resolve' 'bootstrap_typecheck' 'bootstrap_eval'"
          - name: backend
            # 'build_cmd' (T8): THE end-to-end gate for the SHIPPING `medaka build` CLI —
            # 14 real programs built through the actual CLI, each binary's stdout diffed
            # against a committed golden. It was MISFILED in CI-COVERAGE-TOOLS.txt as a
            # "build helper", which is a claim that running it proves nothing about the
            # compiler; that claim was false, and filing it there made the coverage gate
            # SUBTRACT it from its own scope and then certify full coverage. Nothing had
            # invoked it in an unknown length of time. It is the gate that would have caught
            # this session's diff_compiler_llvm bug (201/201 green against goldens no
            # `medaka build` binary can produce — it was grading its own probe).
            # 14 ok / 0 failing. Reads no test/bin oracle; needs only ./medaka + the emitter.
            pattern: "'diff_compiler_llvm*' 'diff_compiler_build' 'diff_compiler_selfproc' 'diff_compiler_stack_overflow' 'diff_compiler_let_refute' 'diff_compiler_tmc_parity' 'selfcompile_lex' 'selfcompile_emit' 'selfcompile_build_fixpoint' 'diff_native_cli' 'diff_native_stack' 'build_cmd'"
          - name: tools
            pattern: "'diff_compiler_lint*' 'diff_compiler_lsp*' 'diff_compiler_repl' 'diff_compiler_new' 'diff_compiler_test' 'diff_compiler_ported' 'diff_compiler_capability_matrix' 'diff_compiler_internal_extern' 'diff_compiler_effect*' 'diff_compiler_run_check_agreement' 'diff_compiler_run_entry_subdir' 'diff_compiler_perf_scaling' 'diff_compiler_ci_shard_coverage' 'diff_compiler_fixture_corpus_coverage' 'diff_compiler_source_bytes' 'check_syntax_examples' 'cross_project_deps' 'cross_project_twonames' 'manifest_emit' 'lsp_harness' 'diff_net'"
    name: gates (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      # sqlite3 is the ORACLE for the 22 sqlite/test/*oracle.sh gates in the `sqlite`
      # shard — they generate a .db with the real sqlite3 CLI, read it back with both
      # sqlite3 and the Medaka library, and diff. It ships on ubuntu-latest, but it is
      # named EXPLICITLY here: an oracle that a gate silently depends on and the workflow
      # never mentions is exactly how "this didn't run" starts looking like "this passed".
      #
      # Installed on EVERY shard rather than only `sqlite`. It is ~1s from the apt cache,
      # and a per-shard toolchain would mean a gate moved between shards for cost reasons
      # (which is now a routine act — see the shard-scheduling note above) could silently
      # lose its oracle and start "passing".
      - name: Install toolchain
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev sqlite3

      # See the "Caching" note at the top of this file for the completeness
      # argument. Exact-match key only — no restore-keys.
      - name: Restore cached medaka binary
        id: medaka-cache
        if: needs.detect.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            medaka
            medaka_emitter
          key: medaka-bin-v1-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}

      # A fresh checkout has no ./medaka_emitter, so this is the COLD path: it
      # bootstraps from the checked-in seed (compiler/seed/emitter.ll.gz). Every
      # shard therefore re-proves the trust anchor. If the seed ever goes stale,
      # this is what catches it — before anything downstream can be trusted. 80s.
      #
      # Skipped ONLY on an exact cache hit above. The `seed-health` job (never
      # cached — see the top-of-file note) still runs this same cold path on
      # every push regardless, so the trust anchor is proven at least once per
      # run even when every gates/inlang job skips it here.
      - name: Build medaka (cold bootstrap from seed)
        if: needs.detect.outputs.docs_only != 'true' && steps.medaka-cache.outputs.cache-hit != 'true'
        run: make medaka

      # Per-shard: this shard's oracle set, keyed the same way as the binary
      # above (plus test/build_oracles.sh itself — the script that builds them)
      # AND the shard's own `pattern`.
      #
      # The pattern is load-bearing in the key and it is easy to miss. WHICH oracles a
      # shard builds is derived FROM the pattern (`build_oracles.sh --for <pattern>`),
      # so changing the pattern changes the contents of test/bin. Without the pattern in
      # the key, a `test/bin` cached before the pattern changed would restore, the build
      # step would be SKIPPED, and the newly-needed oracles would simply be ABSENT.
      #
      # This is not hypothetical — it went live the moment the eval shard gained the
      # bootstrap_* gates. It fails loudly rather than silently (run_gates.sh reclassifies
      # a missing oracle as FAIL*, phantom skip, not SKIP — see T1), so it could never
      # have passed-while-proving-nothing. But it would have read as a baffling CI failure
      # on an unrelated commit.
      #
      # We hash the WHOLE ci.yml rather than the pattern string: a pattern contains quotes,
      # spaces and `*`, none of which are legal in a cache key, and Actions has no
      # hash-a-string function. So a comment-only edit to this file also busts the oracle
      # cache. That over-invalidates, and it is deliberately the safe direction to be wrong
      # in — the same trade the `compiler/**` glob above makes, for the same reason.
      - name: Restore cached oracles for this shard
        id: oracle-cache
        if: needs.detect.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: test/bin
          key: oracles-${{ matrix.name }}-v2-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}-${{ hashFiles('.github/workflows/ci.yml') }}

      # Only the oracles THIS shard's gates actually read. See the header.
      # Skipped only on an exact cache hit above — a miss always rebuilds with
      # FORCE=1, so a restored oracle is never trusted on mtime alone (a cache
      # restore sets mtimes to extraction time, not original-build time, which
      # would otherwise defeat build_oracles.sh's own staleness check).
      - name: Build the oracles this shard needs
        if: needs.detect.outputs.docs_only != 'true' && steps.oracle-cache.outputs.cache-hit != 'true'
        run: FORCE=1 sh test/build_oracles.sh --for ${{ matrix.pattern }}

      # run_gates.sh hard-fails when zero gates matched, and reclassifies a
      # missing-oracle exit-2 as a FAILURE rather than a SKIP — so a shard whose
      # patterns match nothing fails LOUDLY instead of reporting a green no-op.
      #
      # (UNQUOTED substitution is deliberate; quoting it would collapse the pattern
      # list into ONE argument and silently degrade the shard to a single bad glob.)
      #
      # ── `full_cores` — set ONLY on the `engines` shard ────────────────────────────
      # diff_compiler_engines picks its own fan-out: ENGINE_JOBS, defaulting to NCPU/2.
      # That default is a HEDGE against sharing a runner with other gates (run_gates'
      # outer pool would otherwise oversubscribe it) — and on a 4-core hosted runner it
      # means the suite's single most expensive gate uses TWO CORES and idles the other
      # two. `engines` is now the only gate in its shard, so give it the whole box: 834
      # CPU-s at 2 workers is ~420s; at 4 it is ~210s. Purely an env knob the gate
      # already exposes — no gate change.
      #
      # Derived from `nproc` rather than hardcoded, so it tracks GitHub's runner size.
      # Every other shard leaves it empty and the gate's own default applies (and no
      # other shard contains that gate — the coverage gate enforces exactly-one).
      - name: Gate shard — ${{ matrix.name }}
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          if [ -n "${{ matrix.full_cores }}" ]; then
            export ENGINE_JOBS="$(nproc)"
            echo "engines shard owns this runner: ENGINE_JOBS=$ENGINE_JOBS"
          fi
          sh test/run_gates.sh ${{ matrix.pattern }}

      # THE REVIEW GATE — must be in THIS job, on the tree the gates just ran over.
      #
      # Roc's model: regeneration is the DEFAULT action and `git diff --exit-code`
      # forces every regenerated byte into review. That guard is what makes a
      # frictionless `--bless` safe. GHC and OCaml, lacking it, deliberately cripple
      # blessing instead. This repo has had NEITHER guard — the dangerous quadrant.
      #
      # TODAY it catches gates that write into the tree. AFTER the snapshot migration
      # lands `medaka snapshot --bless`, it becomes the real guard. It must be
      # load-bearing BEFORE blessing gets easy, not after.
      #
      # Skipped on a docs-only run: nothing above ran, so there is nothing to have
      # drifted — running it anyway would just diff an unmodified checkout.
      - name: The tree must not have drifted
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          if ! git diff --exit-code; then
            echo "::error::A gate in the '${{ matrix.name }}' shard modified tracked files."
            echo "::error::Commit them deliberately, or fix the gate that writes into the tree."
            exit 1
          fi
          untracked="$(git status --porcelain --untracked-files=normal | grep -v '^!!' || true)"
          if [ -n "$untracked" ]; then
            echo "::error::A gate in the '${{ matrix.name }}' shard left untracked files behind:"
            echo "$untracked"
            exit 1
          fi

  # ── The trust anchor ─────────────────────────────────────────────────────────
  #
  # THIS WAS NOT GATED AT ALL until 2026-07-13, and the seed was silently stale on
  # main. The hole was subtle and is worth understanding, because it is the same
  # bug class as everything else this suite was hardened against:
  #
  #   `make medaka` asks   "CAN I build from the seed?"        -> it passed
  #   this gate asks       "does the seed still WORK, and how far has it DRIFTED?"
  #
  # Those are different questions. A stale seed still cold-bootstraps fine (proven:
  # it did, seven times over, while C3a was failing) — so the cold build passing
  # tells you nothing about currency. Nobody was asking the second question.
  #
  # POLICY (see the SEED POLICY note in test/bootstrap_from_seed.sh): the seed only
  # has to WORK. Byte-currency (C3a) is a DRIFT DETECTOR, not a requirement, and
  # demanding it forced a re-mint on every emitter change — 41 re-mints, 86 MB, 40%
  # of the repo's entire git history. So here drift WARNS and a seed that can no
  # longer do its job FAILS. Re-mint at checkpoints (`make bootstrap` is strict).
  # ── Compiler soundness: the two gates that were documented but never enforced ──
  #
  # AGENTS.md has always said: for a compiler `.mdk` change, run the self-compile
  # fixpoint AND typecheck_compiler_source.sh. Neither ran in CI. They ran when an
  # agent remembered — which is a habit, not a gate.
  #
  # It cost us: `snapshot.mdk` declared `export data SnapMode` (which exports a type
  # ABSTRACTLY), medaka_cli.mdk imported `SnapMode(..)`, and every SnapCheck/SnapNew/
  # SnapBless in the CLI was an UNBOUND VARIABLE. It shipped to main and every gate
  # stayed green — because the emitter's ctor table is global, so the ill-typed source
  # still emitted a working binary, and `make medaka` does not gate on hadTypeErrors().
  # Fixed in a10c2705. The bug is not that it broke; it is that it COULDN'T be seen.
  #
  #   typecheck  — is the compiler source well-typed?      (the build does NOT ask)
  #   fixpoint   — does the emitter reproduce itself?      (C3a/C3b byte-identical)
  #
  # These two ask questions no other job asks. `gates` runs the compiler; it never
  # typechecks it. `seed-health` proves the seed WORKS; it never proves the current
  # source is well-typed, nor that emission has reached a fixpoint.
  soundness:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ── DELIBERATELY UNGUARDED: this step runs even when docs_only=true. ─────────
      # Every other step in every heavy job is skipped on a docs-only PR. A doc-link
      # gate guarded that way would be skipped on precisely the PRs it exists to
      # police — present in the repo, looking like protection, providing none.
      # It needs no compiler (pure text analysis), so it is nearly free to always run.
      #
      # Lives in `soundness` because that job already answers "is the tree coherent?",
      # and because soundness is a REQUIRED check — so this gates on merge today,
      # with no repo-settings change needed to make a new job required.
      - name: Docs must not cite dead paths
        run: sh test/check_doc_links.sh

      # Also unguarded, and for the same reason — and this one needs it most. The
      # sibling gate above checks that a doc's cited PATHS exist; this one checks that
      # its cited SYMBOLS do. A repo-wide review found ~44 false concrete claims in the
      # .claude/skills/*/SKILL.md playbooks agents EXECUTE (a `pushTypeError` taught at
      # the wrong arity, a `Show` typeclass that never existed, a 20-name "grep these"
      # index that was 19/20 fictional) — and ~30 were the same mechanical shape: a
      # backticked symbol resolving nowhere in source. Doc rot lands in prose-only PRs,
      # so guarding this on docs_only would skip it on exactly the PRs it must police.
      # Pure text analysis, no compiler.
      - name: Docs must not cite fabricated symbols
        run: sh test/check_agent_doc_symbols.sh

      # Also unguarded, and for the same reason. docs/README.md is GENERATED from the
      # docs' `**Status:**` banners — the whole point being that a hand-maintained index
      # rots (AGENTS.md's own doc-index table sat mislabelling a doc as "IN PROGRESS"
      # that the doc itself called COMPLETE, and nothing noticed for weeks).
      #
      # But a generator nothing checks is just a suggestion: add a doc, forget
      # `make docs-index`, and the index silently goes stale — reintroducing the exact
      # rot it exists to prevent. So regenerate it here and fail if it differs.
      # That is also why gen_docs_index.sh needs no CI-COVERAGE exception: it is named
      # in a run: step, which is what the shard-coverage gate asks for.
      - name: Docs index must be regenerated, not hand-edited
        run: |
          sh test/gen_docs_index.sh
          if ! git diff --exit-code -- docs/README.md; then
            echo "::error::docs/README.md is stale. Run 'make docs-index' and commit the result."
            exit 1
          fi

      - name: Install toolchain
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev
      - name: Build medaka (cold bootstrap from seed)
        if: needs.detect.outputs.docs_only != 'true'
        run: make medaka

      # typecheck_compiler_source.sh exits 2 (SKIP) when its oracle is absent. In CI
      # a skip here is INDISTINGUISHABLE FROM A PASS — the precise bug this whole job
      # exists to close — so build the oracle first and assert on the PASS line, not
      # on the exit status.
      - name: Build the typecheck oracle
        if: needs.detect.outputs.docs_only != 'true'
        run: FORCE=1 sh test/build_oracles.sh --build-one diagnostics_project_main

      - name: Compiler source must be well-typed
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          bash test/typecheck_compiler_source.sh 2>&1 | tee /tmp/tc.log
          if ! grep -q 'PASS: compiler source is type-clean' /tmp/tc.log; then
            echo "::error::The compiler source is ILL-TYPED (or the gate skipped). The build does not gate on this — that is why the gate exists."
            exit 1
          fi

      # The script asserts C3a AND C3b (its exit status is `c3a && c3b`), which is the
      # right bar for a checkpoint re-mint but the WRONG bar for CI. They answer two
      # different questions, and the SEED POLICY (test/bootstrap_from_seed.sh, and the
      # seed-health job below) is explicit that only one of them may block:
      #
      #   C3b — IR1 == IR2. The compiled compiler reproduces its own output. This is
      #         SOUNDNESS, it is independent of the seed, and it must HARD FAIL.
      #   C3a — IR1 == the seed-bootstrapped reference. This is a DRIFT DETECTOR: it
      #         says the checked-in seed is byte-CURRENT, not that anything is broken.
      #
      # Blocking on C3a would turn CI red on every emitter change until someone re-mints
      # the seed — which is precisely the churn that produced 41 re-mints / 86 MB / 40%
      # of this repo's git history before the policy was fixed. So: C3b errors, C3a warns.
      #
      # Do not "simplify" this to the script's exit status. (Also note `| tee` would mask
      # that status anyway — assert on the verdict lines, as seed-health does.)
      - name: Emitter must reproduce itself (C3b fixpoint; C3a drift only warns)
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          bash test/selfcompile_fixpoint.sh 2>&1 | tee /tmp/fp.log || true
          # A skip is not a pass. We just installed clang+libgc, so a toolchain skip here
          # means something is wrong, not absent.
          if grep -q 'skipping spike' /tmp/fp.log; then
            echo "::error::The fixpoint gate SKIPPED on a runner with a full toolchain. A skip is not a pass."
            exit 1
          fi
          if ! grep -q 'C3b PASS' /tmp/fp.log; then
            echo "::error::NO FIXPOINT: the compiled compiler does not reproduce its own output (C3b). This is a miscompile in the emitter."
            exit 1
          fi
          if grep -q 'C3a FAIL' /tmp/fp.log; then
            echo "::warning::Seed has DRIFTED from current emission (it still works, and the compiler still reaches a fixpoint). Re-mint at the next checkpoint: sh test/refresh_seed.sh"
          fi

  seed-health:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev
      - name: Seed must still build a working emitter (drift only warns)
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          sh test/bootstrap_from_seed.sh 2>&1 | tee /tmp/seed.log
          # A seed that cannot do its job is a HARD failure — the script exits
          # nonzero for that, and `set -e`-less `tee` would hide it, so check.
          if ! grep -q 'BOOTSTRAP-FROM-SEED PASS' /tmp/seed.log; then
            echo "::error::The seed can no longer build a working emitter. Re-mint: sh test/refresh_seed.sh"
            exit 1
          fi
          # Drift is informative, not actionable-right-now. Surface it, don't block.
          if grep -q 'C3a WARN' /tmp/seed.log; then
            echo "::warning::Seed has DRIFTED from current emission (still works). Re-mint at the next checkpoint: sh test/refresh_seed.sh"
          fi

  # ── The in-language suite: doctests, properties, `test "..."` decls ───────────
  inlang:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        if: needs.detect.outputs.docs_only != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev
      # Same cache as the `gates` job — see the top-of-file "Caching" note.
      - name: Restore cached medaka binary
        id: medaka-cache
        if: needs.detect.outputs.docs_only != 'true'
        uses: actions/cache@v4
        with:
          path: |
            medaka
            medaka_emitter
          key: medaka-bin-v1-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}
      - name: Build medaka (cold bootstrap from seed)
        if: needs.detect.outputs.docs_only != 'true' && steps.medaka-cache.outputs.cache-hit != 'true'
        run: make medaka
      - name: Doctests, properties, and test decls
        if: needs.detect.outputs.docs_only != 'true'
        run: make test
