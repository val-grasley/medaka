name: CI

# GitHub-HOSTED runners. Free and unlimited for public repositories, with 20
# concurrent jobs on the Free plan.
#
# The suite is SHARDED across that concurrency rather than run as one long job.
# This matters: a single hosted runner is 2-4 cores, and this suite's speed comes
# almost entirely from parallelism (oracle build 327s -> 34s, gate suite 125s ->
# 32s, both measured on 12 cores). Serialized onto one small runner it would be
# painfully slow. Fanned out across 6 jobs it has MORE aggregate throughput than
# the 12-core box it used to run on — and the 20-job ceiling leaves room to split
# the engines gate further if it becomes the bottleneck again.
#
# Shape: build ONCE (the compiler + the 54 stage oracles), upload as an artifact,
# then every gate shard downloads it. Without this each shard would pay the
# ~4 min build again and the sharding would be worthless.
#
# NOTE: this repo previously used a self-hosted runner on the dev box. That was
# removed when the repo went public: a fork PR on a public repo with a self-hosted
# runner is arbitrary code execution on the runner host. Do not reintroduce one.

on:
  push:
    branches: [main, testing-arc]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Oracles are throwaway binaries whose runtime is hidden by parallelism; -O0
  # builds them much faster. The emitter is the reused workhorse, so it stays -O2.
  ORACLE_OPT: -O0

jobs:
  # ── Build once ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev

      # A fresh checkout has no ./medaka_emitter, so this is the COLD path: it
      # bootstraps from the checked-in seed (compiler/seed/emitter.ll.gz). Every CI
      # run therefore re-proves the trust anchor. If the seed goes stale, this is
      # what catches it — before anything downstream can be trusted.
      - name: Build medaka (cold bootstrap from seed)
        run: make medaka

      # FORCE is mandatory, not caution: build_oracles.sh mtime-skips, and a stale
      # test/bin/* oracle silently makes every gate below pass against an old
      # compiler. (That bug is why the docs used to say "always FORCE=1".)
      - name: Build stage oracles
        run: FORCE=1 sh test/build_oracles.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medaka-build
          path: |
            medaka
            medaka_emitter
            test/bin/
          retention-days: 1
          if-no-files-found: error

  # ── Fan out ─────────────────────────────────────────────────────────────────
  gates:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false          # one shard failing must not hide the others
      matrix:
        include:
          # The engines gate is the long pole by an order of magnitude: it shells
          # to clang once per fixture across a ~346-fixture corpus. It gets its own
          # shard so it never gates the others.
          - name: engines
            pattern: 'diff_compiler_engines'
          - name: frontend
            pattern: 'diff_compiler_lex*' 'diff_compiler_parse*' 'diff_compiler_desugar*' 'diff_compiler_mark*' 'diff_compiler_resolve*' 'diff_compiler_comments' 'diff_compiler_positions' 'diff_compiler_printer' 'diff_compiler_fmt'
          - name: types
            pattern: 'diff_compiler_typecheck*' 'diff_compiler_check*' 'diff_compiler_exhaust' 'diff_compiler_diagnostics' 'diff_compiler_analyze_project'
          - name: eval
            pattern: 'diff_compiler_eval*' 'diff_compiler_core_ir*'
          - name: backend
            pattern: 'diff_compiler_llvm*' 'diff_compiler_build' 'diff_compiler_selfproc' 'diff_compiler_stack_overflow' 'diff_compiler_let_refute'
          - name: tools
            pattern: 'diff_compiler_lint*' 'diff_compiler_lsp*' 'diff_compiler_repl' 'diff_compiler_new' 'diff_compiler_test' 'diff_compiler_ported' 'diff_compiler_capability_matrix' 'diff_compiler_internal_extern' 'diff_compiler_effect*' 'diff_compiler_run_check_agreement' 'diff_compiler_run_entry_subdir'
    name: gates (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: medaka-build

      - name: Restore executable bits
        run: chmod +x medaka medaka_emitter test/bin/* 2>/dev/null || true

      # run_gates.sh hard-fails if zero gates passed, and reclassifies a
      # missing-oracle exit-2 as a FAILURE rather than a SKIP. So a shard whose
      # pattern matches nothing FAILS LOUDLY instead of reporting a green no-op —
      # which is exactly the trap this suite used to fall into.
      # UNQUOTED substitution is deliberate: matrix.pattern is a list of ALREADY
      # single-quoted globs, and those inner quotes are what stop the workflow's own
      # shell from expanding them before run_gates.sh sees them. Wrapping the whole
      # thing in another pair of quotes would collapse it into ONE argument and the
      # multi-pattern shard would silently degrade to a single bogus glob.
      - name: Gate shard — ${{ matrix.name }}
        run: sh test/run_gates.sh ${{ matrix.pattern }}

  # ── The in-language suite ───────────────────────────────────────────────────
  inlang:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev
      - uses: actions/download-artifact@v4
        with:
          name: medaka-build
      - run: chmod +x medaka medaka_emitter test/bin/* 2>/dev/null || true
      - name: Doctests, properties, and test decls
        run: make test

  # ── The review gate ─────────────────────────────────────────────────────────
  review-gate:
    needs: [gates, inlang]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev
      - uses: actions/download-artifact@v4
        with:
          name: medaka-build
      - run: chmod +x medaka medaka_emitter test/bin/* 2>/dev/null || true

      # Roc's model: regeneration is the DEFAULT action, and `git diff --exit-code`
      # forces every regenerated byte into review. That guard is what makes a
      # frictionless `--bless` safe. GHC and OCaml, lacking it, deliberately cripple
      # blessing instead (GHC's accept only fires on already-failing tests; OCaml's
      # `make promote` refuses to run suite-wide). This repo has historically had
      # NEITHER guard — the dangerous quadrant.
      #
      # TODAY this catches gates that write into the tree. AFTER the snapshot
      # migration lands `medaka snapshot --bless`, this becomes the real guard.
      # It must be load-bearing BEFORE blessing gets easy, not after.
      - name: The tree must not have drifted
        run: |
          if ! git diff --exit-code; then
            echo "::error::The suite modified tracked files — goldens/artifacts drifted."
            echo "::error::Commit them deliberately, or fix the gate that writes into the tree."
            exit 1
          fi
          untracked="$(git status --porcelain --untracked-files=normal | grep -v '^!!' || true)"
          if [ -n "$untracked" ]; then
            echo "::error::The suite left untracked files behind:"
            echo "$untracked"
            exit 1
          fi
