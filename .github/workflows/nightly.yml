name: Nightly

# Scheduled home for gates that are deliberately NOT on the PR path (see
# test/CI-COVERAGE-EXCEPTIONS.txt for the retired ledger entries this workflow
# replaces — workstream item T-4, .claude/workstreams/TESTING.md).
#
#   check_removed_constructs  ~2-3 min tree-wide scan. Correct and cheap, just too
#                              slow for every push. Here it is a NORMAL pass/fail
#                              job — a red run is a genuine regression.
#
#   fuzz_diff                 a FUZZER. It must NOT be a pass/fail PR gate: a green
#                              run proves nothing (it only means these particular
#                              random seeds didn't find anything) and a red run may
#                              not even reproduce (a generator-side gap, not
#                              necessarily a compiler bug). So this job never fails
#                              the workflow on a fuzz FINDING — it FILES one
#                              (uploads the reproducer as a build artifact and
#                              opens/updates a tracking issue) and reports how many
#                              cases it actually ran. It DOES fail loudly if it ran
#                              ZERO cases (a missing oracle / toolchain problem is
#                              infra rot, not a fuzz finding — "didn't run" must
#                              never look like "passed").
#
#   playground_e2e             the browser e2e gate for the web playground (#72 pt.4).
#                              Was UNOWNED (test/CI-COVERAGE-EXCEPTIONS.txt: "status in
#                              CI genuinely unknown") — a stock runner has neither a
#                              built playground/dist/playground.wasm (gitignored) nor
#                              Google Chrome, both of which playground/e2e/run.sh needs.
#                              This job builds the wasm artifact, installs system Chrome,
#                              and runs the harness by its literal path so the coverage
#                              gate counts it "named". PLAIN pass/fail (the
#                              check_removed_constructs shape, not fuzz_diff's): there is
#                              no sampling to distinguish "ran zero" from "found
#                              nothing", so the harness's own exit code is the signal.
#
# Mirrors ci.yml's bootstrap (checkout -> install clang/libgc -> cache/cold-build
# `make medaka` -> build only the oracles the gate needs) — see that file for the
# full rationale on caching and the oracle `--for` derivation. This workflow is
# NOT path-filtered (there's no PR diff to filter on a schedule) and is NOT part
# of branch protection's required-checks list, so it is free to skip entirely,
# fail, or take longer without blocking any PR.
on:
  schedule:
    # 07:17 UTC daily — an arbitrary off-the-hour time, not midnight/top-of-hour,
    # to avoid GitHub Actions' scheduling congestion at round times.
    - cron: '17 7 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-removed-constructs:
    name: check_removed_constructs (tree-wide scan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev

      # Same cache as ci.yml's `gates`/`inlang` jobs — see that file's top-of-file
      # "Caching" note for the completeness argument on the key.
      - name: Restore cached medaka binary
        id: medaka-cache
        uses: actions/cache@v4
        with:
          path: |
            medaka
            medaka_emitter
          key: medaka-bin-v1-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}

      - name: Build medaka (cold bootstrap from seed)
        if: steps.medaka-cache.outputs.cache-hit != 'true'
        run: make medaka

      # check_removed_constructs.sh invokes ./medaka directly (no test/bin oracle
      # needed) and derives its own root via `dirname "$0"`, but MEDAKA_ROOT is
      # exported anyway per the documented footgun: some scripts in this suite
      # silently misresolve stdlib without it when the binary isn't run from the
      # exact directory it expects.
      - name: Tree-wide scan for stale removed-construct usage
        env:
          MEDAKA_ROOT: ${{ github.workspace }}
        run: bash test/check_removed_constructs.sh

  fuzz-diff:
    name: fuzz_diff (bounded nightly sweep; findings are FILED, not failed)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev

      - name: Restore cached medaka binary
        id: medaka-cache
        uses: actions/cache@v4
        with:
          path: |
            medaka
            medaka_emitter
          key: medaka-bin-v1-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}

      - name: Build medaka (cold bootstrap from seed)
        if: steps.medaka-cache.outputs.cache-hit != 'true'
        run: make medaka

      # fuzz_diff.sh reads test/bin/fuzz_gen_main (the native program generator)
      # and test/bin/eval_dict_main (the native-interp oracle). `--for 'fuzz_diff'`
      # derives exactly those two from the gate script itself — see ci.yml's
      # "Why NO GATE NEEDS ALL 54" note for the general mechanism.
      - name: Build the oracles fuzz_diff needs
        run: FORCE=1 sh test/build_oracles.sh --for 'fuzz_diff'

      # BOUNDED on two axes so this can never run forever: a fixed seed/iteration
      # count passed to the script, AND a `timeout` wrapper as a hard backstop in
      # case the per-case cost estimate this count was chosen from drifts high.
      #
      #   Tier-A (oracle + invariants): 1000 seeds, the cheap tier (~500ms/batch
      #     of 12, amortized) — a large sweep for not much wall-clock.
      #   Tier-C (oracle vs `medaka build`): opt-in, 150 programs. This tier is
      #     ~2.8s/program (native build + clang), the highest-leverage tier per
      #     the script's own header (it exercises the artifact users actually
      #     ship, and was previously UNFUZZED), so it's worth the nightly budget.
      #
      # fuzz_diff.sh is `#!/usr/bin/env bash` and uses `local` inside a function —
      # it is NOT POSIX sh; the documented footgun is that dash-as-/bin/sh can
      # silently mis-handle a bash-only script, so it is invoked with `bash`
      # explicitly here, never `sh`.
      - name: Run the fuzzer (bounded — 1000 Tier-A + 150 Tier-C native)
        id: fuzz
        run: |
          set +e
          timeout 45m bash test/fuzz_diff.sh 1 1000 2 12 1 150 > /tmp/fuzz.log 2>&1
          rc=$?
          set -e
          cat /tmp/fuzz.log

          tierA_ran=$(sed -n 's/^ran=\([0-9]*\).*/\1/p' /tmp/fuzz.log | head -1)
          tierC_ran=$(sed -n 's/^native: ran=\([0-9]*\).*/\1/p' /tmp/fuzz.log | head -1)
          result_line=$(grep -m1 '^RESULT:' /tmp/fuzz.log || true)
          findings=0
          if printf '%s' "$result_line" | grep -q 'NEW finding'; then
            findings=$(printf '%s' "$result_line" | sed -n 's/^RESULT: \([0-9]*\) NEW.*/\1/p')
          fi

          {
            echo "## fuzz_diff nightly sweep"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Tier-A cases run | ${tierA_ran:-0} |"
            echo "| Tier-C (native) cases run | ${tierC_ran:-0} |"
            echo "| New findings | ${findings:-0} |"
            echo "| fuzz_diff.sh exit code | $rc |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "ran=${tierA_ran:-0}" >> "$GITHUB_OUTPUT"
          echo "native_ran=${tierC_ran:-0}" >> "$GITHUB_OUTPUT"
          echo "findings=${findings:-0}" >> "$GITHUB_OUTPUT"

          # "This didn't run" must never look like "this passed" (AGENTS.md — the
          # theme this whole test suite is hardened against). Zero Tier-A cases run
          # means an infra problem (missing oracle, toolchain, or the `timeout`
          # backstop firing before even one case completed) — that is a genuine
          # job failure, distinct from a fuzz FINDING, which never fails the job.
          if [ -z "$tierA_ran" ] || [ "$tierA_ran" = "0" ]; then
            echo "::error::fuzz_diff.sh ran ZERO Tier-A cases (rc=$rc). This is an infra failure (missing oracle/toolchain, or a timeout before the first case completed) — NOT a clean fuzz pass. See the log above."
            echo "STATUS: DID NOT RUN — see log" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          exit 0

      - name: Upload failing reproducers (if any)
        if: steps.fuzz.outputs.findings != '0'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-failures-${{ github.run_id }}
          path: test/fuzz_failures/*.mdk
          if-no-files-found: warn
          retention-days: 30

      # File (or update) ONE tracking issue rather than one-per-night — dedup by
      # exact title match against open issues. A green PR-path fuzzer would prove
      # nothing (see the file header), so findings are surfaced here instead:
      # durably (the issue persists across nights), not spammily (one issue, not
      # N), and with a self-contained reproducer (the seed + reproduce command,
      # already written into test/fuzz_failures/*.mdk by fuzz_diff.sh itself).
      - name: File or update the fuzz-failure tracking issue
        if: steps.fuzz.outputs.findings != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eu
          TITLE="nightly fuzz_diff: open findings"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY_FILE="$(mktemp)"
          {
            echo "fuzz_diff nightly sweep on $(date -u +%Y-%m-%dT%H:%MZ) found ${{ steps.fuzz.outputs.findings }} new finding(s) out of ${{ steps.fuzz.outputs.ran }} Tier-A + ${{ steps.fuzz.outputs.native_ran }} Tier-C cases run."
            echo ""
            echo "Run: $RUN_URL"
            echo ""
            echo "Failing reproducers are attached to that run as a build artifact"
            echo "(\`fuzz-failures-${{ github.run_id }}\`, from \`test/fuzz_failures/*.mdk\` —"
            echo "each file's header names the exact seed + a \`--seed N\` reproduce command)."
            echo ""
            echo "--- fuzz_diff summary tail ---"
            echo '```'
            tail -n 40 /tmp/fuzz.log
            echo '```'
          } > "$BODY_FILE"

          existing="$(gh issue list --state open --limit 100 --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$BODY_FILE"
            echo "updated existing tracking issue #$existing"
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE"
            echo "opened a new tracking issue"
          fi

  playground-e2e:
    name: "playground_e2e (Playwright vs the built CM6 playground — #72 pt.4)"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Same pinned release ci.yml's `wasm` job uses (see its "Install wasm-tools"
      # step): build_playground_wasm.sh's own wasm-tools parse/validate step (below)
      # needs it on PATH, and pinning keeps CI and the dev box byte-identical.
      WASM_TOOLS_VERSION: 1.219.1
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang libgc-dev

      # node >= 24: build_playground_wasm.sh's own wasm emitter oracle build needs it
      # (finalized WasmGC), and so does playground/e2e/run.sh itself (README: node v20
      # can't run the WasmGC playground module).
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # wasm-tools parses + validates the emitted WAT inside build_playground_wasm.sh
      # ("[2/2] compiling ... to WasmGC"). Same install recipe as ci.yml's `wasm` job.
      - name: Install wasm-tools
        run: |
          set -eu
          v="$WASM_TOOLS_VERSION"
          url="https://github.com/bytecodealliance/wasm-tools/releases/download/v${v}/wasm-tools-${v}-x86_64-linux.tar.gz"
          curl -sSfL "$url" | tar xz
          sudo mv "wasm-tools-${v}-x86_64-linux/wasm-tools" /usr/local/bin/wasm-tools
          wasm-tools --version

      # playground/e2e/tests/playground.spec.mjs launches
      # `chromium.launch({channel:'chrome'})` — the SYSTEM Google Chrome, never a
      # Playwright-managed download (README: `npx playwright install chromium`
      # TLS-fails behind the dev box's DLP interception, and AGENTS.md forbids working
      # around that by disabling TLS verification — so the harness uses system Chrome
      # unconditionally, not just on that one machine). Installing it explicitly here
      # keeps CI and the dev box on the IDENTICAL launch path with no test-code change;
      # relying on "ubuntu-latest probably ships Chrome" would make an image change
      # someone else's silent infra rot.
      - name: Ensure Google Chrome is available
        run: |
          # ubuntu-latest ships Google Chrome preinstalled — use it when present.
          # Only fall back to installing if it is absent, and then with a
          # NON-interactive gpg: plain `gpg --dearmor` opens /dev/tty and dies on
          # the hosted runner ("cannot open '/dev/tty'"), which is what red'd the
          # first nightly run. --batch --yes keeps it off the tty.
          if command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            google-chrome-stable --version
          else
            curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update -qq
            sudo apt-get install -y google-chrome-stable
            google-chrome-stable --version
          fi

      # Same cache as this workflow's other two jobs and ci.yml's gates/wasm/inlang
      # jobs (identical key -> shared cache hits across workflows). build_playground_wasm.sh
      # calls `make medaka` itself (step "[1/2]"), so a warm cache just makes that a no-op.
      - name: Restore cached medaka binary
        id: medaka-cache
        uses: actions/cache@v4
        with:
          path: |
            medaka
            medaka_emitter
          key: medaka-bin-v1-${{ hashFiles('compiler/**', 'stdlib/**', 'runtime/**', 'test/build_native_medaka.sh', 'test/bootstrap_from_seed.sh', 'test/build_oracles.sh', 'Makefile') }}
      - name: Build medaka (cold bootstrap from seed)
        if: steps.medaka-cache.outputs.cache-hit != 'true'
        run: make medaka

      # The real, documented build command (playground/e2e/README.md "How to run":
      # run.sh "tells you to run bash playground/build_playground_wasm.sh first if
      # not [built]"). It is `set -euo pipefail` and FAILs loudly at each of its own
      # checks (missing wasm-tools, empty WAT, failed wasm-tools validate) — a broken
      # build cannot look like a skip. Classified as a TOOL, not a gate, in
      # test/CI-COVERAGE-TOOLS.txt, so it needs no coverage row of its own.
      - name: Build the playground WasmGC artifact
        run: bash playground/build_playground_wasm.sh

      # playground/e2e/run.sh is itself `set -euo pipefail` and ends with `exit
      # "$STATUS"` (its own pass/fail, propagated) — a plain run step is correct, no
      # wrapper needed to keep a real e2e failure from reading as green. Invoked by its
      # literal repo-relative path (not `cd` + `./run.sh`) so
      # diff_compiler_ci_shard_coverage.sh's "named" mechanism picks it up — see the
      # updated test/CI-COVERAGE-EXCEPTIONS.txt entry this job retires.
      #
      # PLAIN pass/fail job (the check-removed-constructs shape, not fuzz-diff's):
      # there is no sampling here to distinguish "ran zero cases" from "found
      # nothing", so the harness's own step failure IS the loud infra-vs-finding
      # signal (a toolchain problem fails one of the steps ABOVE this one; a real e2e
      # regression fails THIS one). Nightly, not the PR path, so a red run here is
      # reported but never blocks a merge.
      - name: playground e2e (Playwright vs system Chrome)
        run: bash playground/e2e/run.sh

      # Debug aid: the harness screenshots every check into playground/e2e/screenshots/
      # (gitignored). On failure, ship them as a build artifact instead of making
      # someone reproduce locally to see what the browser actually rendered.
      - name: Upload screenshots (debug aid on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playground-e2e-screenshots-${{ github.run_id }}
          path: playground/e2e/screenshots/*.png
          if-no-files-found: warn
          retention-days: 14
